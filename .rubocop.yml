plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'Rakefile'
    - 'bin/**/*'

Style/Documentation:
  Enabled: false

# `be > 0` is idiomatic RSpec for numeric comparisons; `be.positive?` is broken syntax.
Style/NumericPredicate:
  Exclude:
    - 'gem/*/spec/**/*'

Metrics/BlockLength:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'
    - 'gem/*/db/**/*'

Naming/FileName:
  Exclude:
    - 'gem/bsv-wallet/lib/bsv-wallet.rb'
    - 'gem/bsv-wallet-postgres/lib/bsv-wallet-postgres.rb'

# a/b are used in secure_compare for constant-time comparison.
# db is used throughout for Sequel database references.
Naming/MethodParameterName:
  AllowedNames:
    - a
    - b
    - db
    - ds
    - id
    - tx

# BRC-100 Engine implements the interface but intentionally ignores
# originator: on all methods (policy enforcement is a future concern).
Lint/UnusedMethodArgument:
  Exclude:
    - 'gem/bsv-wallet/lib/bsv/wallet/engine.rb'
    - 'gem/bsv-wallet/lib/bsv/wallet/store/**/*'

# Wallet orchestration and store operations are inherently complex;
# splitting into tiny methods would harm readability and auditability.
Metrics/AbcSize:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'
    - '**/Rakefile'

Metrics/MethodLength:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'
    - '**/Rakefile'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'
    - '**/Rakefile'

Metrics/PerceivedComplexity:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'

Metrics/ModuleLength:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'

Metrics/ClassLength:
  Exclude:
    - 'gem/*/lib/**/*'

Metrics/ParameterLists:
  Exclude:
    - 'gem/*/lib/**/*'
    - 'gem/*/spec/**/*'

# BRC-100 interface method names are spec-mandated (e.g. proof_exists?, authenticated?).
# Store adapter primitives like try_lock_input are side-effecting + boolean-returning,
# which doesn't fit the `?` convention.
Naming/PredicateMethod:
  Exclude:
    - 'gem/bsv-wallet/lib/bsv/wallet/engine.rb'
    - 'gem/bsv-wallet/lib/bsv/wallet/store/**/*'
    - 'gem/bsv-wallet-postgres/lib/bsv/wallet/postgres/store/**/*'

Style/SafeNavigationChainLength:
  Exclude:
    - 'gem/bsv-wallet/lib/bsv/wallet/engine.rb'

# Derivation branches are structurally identical but semantically distinct
Lint/DuplicateBranch:
  Exclude:
    - 'gem/bsv-wallet/lib/bsv/wallet/key_deriver.rb'

# Test doubles for interfaces without concrete classes
RSpec/VerifiedDoubles:
  Exclude:
    - 'gem/*/spec/**/*'

# Using subject directly is fine in concise specs
RSpec/NamedSubject:
  Enabled: false

# Specs testing the same invariant under different setup aren't duplicates
RSpec/RepeatedExample:
  Enabled: false

Layout/LineLength:
  Max: 150
  Exclude:
    - 'gem/*/spec/**/*'

RSpec/ContextWording:
  Enabled: false

# Integration specs legitimately need multiple assertions per example
# and longer examples for thorough lifecycle coverage.
RSpec/MultipleExpectations:
  Exclude:
    - 'gem/*/spec/**/*'

RSpec/MultipleMemoizedHelpers:
  Exclude:
    - 'gem/*/spec/**/*'

RSpec/ExampleLength:
  Exclude:
    - 'gem/*/spec/**/*'

Naming/VariableNumber:
  Exclude:
    - 'gem/*/spec/**/*'

# Schema and migration specs use string descriptions for integration suites.
RSpec/DescribeClass:
  Exclude:
    - 'gem/bsv-wallet-postgres/spec/bsv/wallet/postgres/migration_spec.rb'
    - 'gem/bsv-wallet/spec/bsv/wallet/store/migration_spec.rb'
    - 'gem/bsv-wallet/spec/bsv/wallet/store/constraints_spec.rb'

# Store models live in a models/ subdirectory by design — path != namespace.
# CLI specs cluster under a cli/ subdirectory for the same reason.
RSpec/SpecFilePathFormat:
  Exclude:
    - 'gem/bsv-wallet/spec/bsv/wallet/store/**/*'
    - 'gem/bsv-wallet/spec/bsv/wallet/cli/**/*'

# Engine spec defines TEST_DB_URL and ENGINE_DB at spec scope for shared infrastructure.
Lint/ConstantDefinitionInBlock:
  Exclude:
    - 'gem/bsv-wallet/spec/bsv/wallet/engine_spec.rb'

RSpec/LeakyConstantDeclaration:
  Exclude:
    - 'gem/bsv-wallet/spec/bsv/wallet/engine_spec.rb'

# Empty blocks in spec setup are used for broadcast_queue mocks.
Lint/EmptyBlock:
  Exclude:
    - 'gem/*/spec/**/*'
