name: Documentation

on:
  push:
    branches: [master]
    paths:
      - 'gem/**/lib/**'
      - 'docs/**'
      - '.yardopts'
      - '.github/workflows/docs.yml'
      - 'gem/bsv-wallet/Rakefile'
      - 'Gemfile'
  pull_request:
    branches: [master]
    paths:
      - 'gem/**/lib/**'
      - 'docs/**'
      - '.yardopts'
      - '.github/workflows/docs.yml'
      - 'gem/bsv-wallet/Rakefile'
      - 'Gemfile'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # configure-pages requires both — without them the build job fails
      # before the artefact is uploaded. Same set as the deploy job below.
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      # YARD generation — uses the bsv-wallet gem's Rakefile (which is where
      # the docs:* namespace lives). Ruby 3.4 across both setup-ruby steps
      # matches docs/Gemfile.lock's RUBY VERSION pin (3.4.2). Splitting Ruby
      # versions between the two steps would break bundle exec rake docs:*
      # because rake resolves through the root Gemfile, whose gems were
      # installed under the first setup-ruby's Ruby version.
      - name: Set up Ruby (YARD)
        uses: ruby/setup-ruby@v1
        with:
          # Pinned to 3.4.2 to match docs/Gemfile.lock's RUBY VERSION; using
          # the floating '3.4' would drift on patch releases and trigger a
          # Bundler warning (or refusal) when the installed Ruby differs
          # from the lockfile pin.
          ruby-version: '3.4.2'
          working-directory: gem/bsv-wallet
          bundler-cache: true

      - name: Generate YARD markdown
        run: bundle exec rake docs:generate
        working-directory: gem/bsv-wallet

      # Jekyll build — uses docs/Gemfile (separate bundler-cache key)
      - name: Set up Ruby (Jekyll)
        uses: ruby/setup-ruby@v1
        with:
          # Same patch pin as the YARD step (matches docs/Gemfile.lock).
          ruby-version: '3.4.2'
          working-directory: docs
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec rake docs:build
        working-directory: gem/bsv-wallet

      - name: Lint docs frontmatter
        run: bundle exec rake docs:lint
        working-directory: gem/bsv-wallet

      # Offline link + anchor check via html-proofer (Jekyll-aware: handles
      # the baseurl prefix via swap_urls; lychee can't resolve root-relative
      # URLs against a local _site tree).
      - name: Check internal links
        run: bundle exec rake docs:proofread
        working-directory: gem/bsv-wallet

      # Upload artefact for the deploy job — skipped on PR runs since
      # the deploy job is also skipped (only push to master deploys).
      - uses: actions/configure-pages@v6
        if: github.event_name == 'push'
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push'
        with:
          path: docs/_site

  deploy:
    # Only deploy on push to master. PR runs are dry-run only: they
    # build, lint, and link-check the site without touching Pages.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
