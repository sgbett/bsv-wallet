name: Documentation

on:
  push:
    branches: [master]
    paths:
      - 'gem/**/lib/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.yardopts'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'gem/**/lib/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.yardopts'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Default to read; only the deploy job (master push) escalates to write.
# Per-job permissions confine `contents: write` to the gh-deploy step,
# so a PR-modified workflow cannot push to the repo on a PR run.
permissions:
  contents: read

env:
  # Suppresses the noisy "MkDocs 2 is coming" banner so the carve-out gate
  # below operates on real content warnings only.
  DISABLE_MKDOCS_2_WARNING: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: gem/bsv-wallet

      - name: Generate YARD markdown
        run: bundle exec rake docs:generate
        working-directory: gem/bsv-wallet

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build with carve-out gate
        # The documented carve-out (see docs/about-these-docs.md): vendored
        # upstream BRC pages link to siblings we haven't vendored, and
        # selected docs/concepts/ and docs/reference/ pages cite
        # ../../.architecture/ ADRs/reviews — both render correctly on
        # GitHub but generate mkdocs link warnings. The gate fails only on
        # warnings outside those known patterns, so a NEW genuine broken
        # link surfaces instead of hiding in the noise.
        run: |
          set -e
          # `set -e` does NOT propagate failure through `log=$(...)` — capture
          # the exit status explicitly so a failing build doesn't fall through
          # to the warning check and falsely pass.
          log=$(mkdocs build 2>&1)
          build_status=$?
          echo "$log"
          if [ $build_status -ne 0 ]; then
            echo "::error::mkdocs build failed (exit $build_status)"
            exit $build_status
          fi
          unexpected=$(echo "$log" | grep WARNING | grep -vE 'reference/external|reference/drafts|/\.architecture/' || true)
          if [ -n "$unexpected" ]; then
            echo ""
            echo "::error::Unexpected mkdocs warnings (outside documented carve-out):"
            echo "$unexpected"
            exit 1
          fi

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      # gh-deploy commits to the gh-pages branch.
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: gem/bsv-wallet

      - name: Generate YARD markdown
        run: bundle exec rake docs:generate
        working-directory: gem/bsv-wallet

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs dependencies
        run: pip install -r docs/requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
