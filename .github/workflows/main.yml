name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bsv_wallet_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Bundle install (wallet)
        run: bundle install
        working-directory: gem/bsv-wallet

      - name: Run wallet specs (SQLite)
        run: bundle exec rspec spec/bsv spec/bin
        working-directory: gem/bsv-wallet
        env:
          COVERAGE: ${{ matrix.ruby == '3.4' && 'true' || '' }}

      - name: Run wallet specs (Postgres)
        run: bundle exec rspec spec/bsv spec/bin
        working-directory: gem/bsv-wallet
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/bsv_wallet_test

      - name: Upload coverage
        if: matrix.ruby == '3.4'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Run RuboCop
        if: matrix.ruby == '3.4'
        run: bundle exec rubocop
        working-directory: gem/bsv-wallet

  integration:
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    name: Integration (CLI porcelain pipeline)

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Bundle install
        run: bundle install
        working-directory: gem/bsv-wallet

      - name: Run integration specs
        run: bundle exec rspec spec/integration
        working-directory: gem/bsv-wallet
        env:
          BSV_WALLET_WIF_ALICE: ${{ secrets.BSV_WALLET_WIF_ALICE }}
          BSV_WALLET_WIF_BOB: ${{ secrets.BSV_WALLET_WIF_BOB }}
