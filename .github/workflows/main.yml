name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bsv_wallet_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.0', '3.1', '3.2', '3.3', '3.4']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: gem/bsv-wallet

      - name: Run wallet specs
        run: bundle exec rspec
        working-directory: gem/bsv-wallet
        env:
          COVERAGE: ${{ matrix.ruby == '3.4' && 'true' || '' }}
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/bsv_wallet_test

      - name: Set up Ruby (postgres gem)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: gem/bsv-wallet-postgres

      - name: Run postgres specs
        run: bundle exec rspec
        working-directory: gem/bsv-wallet-postgres
        env:
          COVERAGE: ${{ matrix.ruby == '3.4' && 'true' || '' }}
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/bsv_wallet_test

      - name: Upload coverage
        if: matrix.ruby == '3.4'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Run RuboCop
        if: matrix.ruby == '3.4'
        run: bundle exec rubocop
        working-directory: gem/bsv-wallet
