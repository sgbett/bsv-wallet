name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Cheap gate: did anything CI actually exercises change? Output drives the
  # spec jobs' `if:`. Filtering here (not via trigger-level paths-ignore) means
  # the workflow always runs, so on docs-only changes the spec jobs report a
  # `skipped` conclusion — which branch protection treats as PASSED, rather than
  # leaving a required check pending forever and blocking the PR.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'gem/**'
              - '.github/workflows/**'

  test:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bsv_wallet_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']

    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Bundle install (wallet)
        run: bundle install
        working-directory: gem/bsv-wallet

      # Bare run = "allow all, deny on-chain": the --exclude-pattern in
      # .rspec drops spec/e2e + spec/integration, so every unit spec runs
      # (including the e2e harness's pure-Ruby helper specs now in
      # spec/support/e2e) without the fragile positive cherry-pick.
      - name: Run wallet specs (SQLite)
        run: bundle exec rspec
        working-directory: gem/bsv-wallet
        env:
          COVERAGE: ${{ matrix.ruby == '3.4' && 'true' || '' }}

      - name: Run wallet specs (Postgres)
        run: bundle exec rspec
        working-directory: gem/bsv-wallet
        env:
          # Spec helper derives <base>/bsv_wallet_test from this and
          # ignores DATABASE_URL — separation of operator vs test DB.
          BSV_WALLET_POSTGRES: postgres://postgres:postgres@localhost:5433/

      - name: Upload coverage
        if: matrix.ruby == '3.4'
        uses: codecov/codecov-action@v7
        with:
          files: coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Run RuboCop
        if: matrix.ruby == '3.4'
        run: bundle exec rubocop
        working-directory: gem/bsv-wallet

  integration:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' && (github.event_name == 'push' || !github.event.pull_request.head.repo.fork) }}
    runs-on: ubuntu-latest
    name: Integration (CLI porcelain pipeline)

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Bundle install
        run: bundle install
        working-directory: gem/bsv-wallet

      - name: Create per-wallet Postgres databases
        run: |
          for db in alice bob carol test; do
            PGPASSWORD=postgres psql -h localhost -p 5433 -U postgres -c "CREATE DATABASE bsv_wallet_${db};"
          done

      - name: Run integration specs
        run: bundle exec rspec spec/integration
        working-directory: gem/bsv-wallet
        env:
          BSV_WALLET_WIF_ALICE: ${{ secrets.BSV_WALLET_WIF_ALICE }}
          BSV_WALLET_WIF_BOB: ${{ secrets.BSV_WALLET_WIF_BOB }}
          BSV_WALLET_WIF_CAROL: ${{ secrets.BSV_WALLET_WIF_CAROL }}
          DATABASE_URL_ALICE: postgres://postgres:postgres@localhost:5433/bsv_wallet_alice
          DATABASE_URL_BOB: postgres://postgres:postgres@localhost:5433/bsv_wallet_bob
          DATABASE_URL_CAROL: postgres://postgres:postgres@localhost:5433/bsv_wallet_carol
          # Generic Postgres URL for :postgres-tagged integration specs that
          # don't need a wallet-specific DB. Without this, the
          # +skip unless ENV['DATABASE_URL']+ guards in those specs hide
          # failures in CI while they surface locally.
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/bsv_wallet_test

  # The single required status check (see the "Block unless CI green" ruleset).
  # The spec jobs above are matrix / job-level-`if:` gated, so on docs-only
  # changes they don't expand — they report once under the un-expanded name
  # `Ruby ${{ matrix.ruby }}`, and the per-version contexts the ruleset would
  # otherwise require (`Ruby 3.3`, `Ruby 3.4`) never appear, leaving the PR
  # blocked on checks that never arrive. This aggregator always runs
  # (`if: always()`), so the `ci` context is always reported: it passes when the
  # spec jobs succeeded OR were legitimately skipped, and fails only when one
  # actually failed or was cancelled. Require `ci` instead of the matrix names.
  ci:
    name: ci
    needs: [changes, test, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require spec jobs to pass (skips are OK on docs-only changes)
        env:
          CHANGES: ${{ needs.changes.result }}
          TEST: ${{ needs.test.result }}
          INTEGRATION: ${{ needs.integration.result }}
        run: |
          echo "changes=$CHANGES test=$TEST integration=$INTEGRATION"
          for result in "$CHANGES" "$TEST" "$INTEGRATION"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::A required CI job did not pass (result=$result)"
              exit 1
            fi
          done
