site_name: BSV Wallet
site_description: BRC-100 compliant BSV wallet in Ruby
site_url: https://sgbett.github.io/bsv-wallet/
repo_url: https://github.com/sgbett/bsv-wallet
repo_name: sgbett/bsv-wallet

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true
  - redirects:
      redirect_maps:
        # Pages removed in the docs/410 reshape — redirect old URLs to
        # their closest sensible new home so external bookmarks and
        # search results don't 404. Source paths are relative to docs/.
        'design.md': 'concepts/architecture.md'
        'wallet-events.md': 'reference/events.md'
        'reference/createaction-lifecycle.md': 'concepts/action-lifecycle.md'

nav:
  - Home: index.md
  - About these docs: about-these-docs.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Guides:
    - Sending payments: guides/sending-payments.md
    - Broadcast lifecycle: guides/broadcast-lifecycle.md
    - Operating the daemon: guides/operating-the-daemon.md
    - Safety rules: guides/safety-rules.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Action lifecycle: concepts/action-lifecycle.md
    - Transactions & BEEF: concepts/transactions-and-beef.md
    - Transmission: concepts/transmission.md
    - Persistence: concepts/persistence.md
    - Events: concepts/events.md
    - UTXO management: concepts/utxo-management.md
    - Keys & cryptography: concepts/keys-and-cryptography.md
    - Resilience & recovery: concepts/resilience-and-recovery.md
    - Daemon: concepts/daemon.md
    - Network: concepts/network.md
  - Reference:
    - API: reference/api/index.md
    - Principle of state: reference/principle-of-state.md
    - State boundaries: reference/state-boundaries.md
    - State representations: reference/state-representations.md
    - Schema: reference/schema.md
    - Action lifecycle: reference/action-lifecycle.md
    - Transactions: reference/transactions.md
    - Events: reference/events.md
    - Raw transactions: reference/raw-tx.md
    - SSE: reference/sse.md
    - External specs:
      - BRC-100: reference/external/BRC100.md
