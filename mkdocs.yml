site_name: BSV Wallet
site_description: BRC-100 compliant BSV wallet in Ruby
site_url: https://sgbett.github.io/bsv-wallet/
repo_url: https://github.com/sgbett/bsv-wallet
repo_name: sgbett/bsv-wallet

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Design: design.md
  - Reference:
    - API: reference/api/index.md
    - Principle of state: reference/principle-of-state.md
    - State boundaries: reference/state-boundaries.md
    - State representations: reference/state-representations.md
    - Schema: reference/schema.md
    - Action lifecycle: reference/action-lifecycle.md
    - Transactions: reference/transactions.md
    - Raw transactions: reference/raw-tx.md
    - SSE: reference/sse.md
    - External specs:
      - BRC-100: reference/external/BRC100.md
